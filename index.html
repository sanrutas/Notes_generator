<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guitar Fretboard Practice</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafaf7;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin: 0 0 1.5rem;
      text-align: center;
    }

    /* ---------- Note display ---------- */
    #note-display {
      background: #efede5;
      border-radius: 12px;
      padding: 2rem 1rem;
      text-align: center;
      margin-bottom: 1.5rem;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    #string-line {
      font-size: 18px;
      color: #666;
      font-weight: 500;
    }

    .big-row {
      display: flex;
      align-items: baseline;
      gap: 24px;
      line-height: 1;
    }

    .big-text {
      font-size: 84px;
      font-weight: 500;
      letter-spacing: -2px;
    }

    /* #fret-display { display: none; } */

    #fret-label {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: none;
    }

    /* ---------- Controls ---------- */
    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
    }

    .row label {
      font-size: 14px;
      color: #666;
      min-width: 60px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      font-size: 13px;
      color: #666;
    }

    .info-row .val {
      color: #1a1a1a;
      font-weight: 500;
    }

    input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #d3d1c7;
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #1a1a1a;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #1a1a1a;
      cursor: pointer;
      border: none;
    }

    .readout {
      font-size: 14px;
      font-weight: 500;
      min-width: 32px;
      text-align: right;
    }

    button {
      height: 44px;
      border: 0.5px solid #999;
      background: white;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s, transform 0.1s;
      color: #1a1a1a;
    }

    button:hover { background: #f0f0f0; }
    button:active { transform: scale(0.98); }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    #toggle { flex: 1; }
    #reset { padding: 0 16px; }

    /* ---------- String toggles ---------- */
    .strings-section {
      margin-bottom: 1.5rem;
    }

    .strings-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    #string-toggles {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .string-btn {
      height: 36px;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 500;
    }

    .string-btn.on {
      background: #1a1a1a;
      color: white;
      opacity: 1;
    }

    .string-btn.off {
      background: transparent;
      color: #666;
      opacity: 0.6;
    }

    /* ---------- Settings ---------- */
    details summary {
      font-size: 13px;
      color: #666;
      cursor: pointer;
      user-select: none;
      padding: 8px 0;
    }

    .settings {
      margin-top: 8px;
      padding: 12px;
      background: #efede5;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 13px;
    }

    .settings label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #1a1a1a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Guitar fretboard practice</h1>

    <div id="note-display">
      <div id="string-line">—</div>
      <div class="big-row">
        <!-- <div id="string-letter" class="big-text">—</div> -->
        <div id="note" class="big-text">—</div>
        <div id="fret-display" class="big-text">—</div>
      </div>
      <div id="fret-label">note &nbsp;·&nbsp; fret</div>
    </div>

    <div class="row">
      <label>BPM</label>
      <input type="range" min="10" max="200" value="45" step="1" id="bpm" />
      <span id="bpm-out" class="readout">45</span>
    </div>

    <div class="row">
      <label>Min fret</label>
      <input type="range" min="0" max="20" value="0" step="1" id="fret-min" />
      <span id="fret-min-out" class="readout">0</span>
    </div>

    <div class="row">
      <label>Max fret</label>
      <input type="range" min="0" max="20" value="12" step="1" id="fret-max" />
      <span id="fret-max-out" class="readout">12</span>
    </div>

    <div class="strings-section">
      <div class="strings-label">Strings (tap to toggle)</div>
      <div id="string-toggles"></div>
    </div>

    <div class="info-row">
      <span>Interval: <span id="interval-out" class="val">1.33s</span></span>
      <span>Beat <span id="beat-out" class="val">0</span></span>
    </div>

    <div class="btn-row">
      <button id="toggle">Start</button>
      <button id="reset">Reset</button>
    </div>

    <details>
      <summary>Settings</summary>
      <div class="settings">
        <label>
          <input type="checkbox" id="show-note" checked />
          <span>Show note name</span>
        </label>
        <label>
          <input type="checkbox" id="pick-fret" />
          <span>Show fret numbers </span>
        </label>
        <label>
          <input type="checkbox" id="use-flats" />
          <span>Use flats (B♭) instead of sharps (A♯)</span>
        </label>
        <!-- <label>
          <input type="checkbox" id="no-repeat" checked />
          <span>Avoid immediate repeats</span>
        </label> -->
        <label>
          <input type="checkbox" id="click-sound" checked />
          <span>Metronome click</span>
        </label>
      </div>
    </details>
  </div>

  <script>
    (function() {
      const sharpNotes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
      const flatNotes  = ['C', 'D♭', 'D', 'E♭', 'E', 'F', 'G♭', 'G', 'A♭', 'A', 'B♭', 'B'];

      // Standard tuning, low to high
      const strings = [
        { name: '6th (low E)', label: 'E', openIdx: 4 },
        { name: '5th (A)',      label: 'A', openIdx: 9 },
        { name: '4th (D)',      label: 'D', openIdx: 2 },
        { name: '3rd (G)',      label: 'G', openIdx: 7 },
        { name: '2nd (B)',      label: 'B', openIdx: 11 },
        { name: '1st (high E)', label: 'E', openIdx: 4 }
      ];

      const noteEl = document.getElementById('note');
      const fretDisplayEl = document.getElementById('fret-display');
      const stringLetterEl = document.getElementById('string-letter');
      const fretLabelEl = document.getElementById('fret-label');
      const stringLineEl = document.getElementById('string-line');
      const bpmEl = document.getElementById('bpm');
      const bpmOut = document.getElementById('bpm-out');
      const fretMinEl = document.getElementById('fret-min');
      const fretMaxEl = document.getElementById('fret-max');
      const fretMinOut = document.getElementById('fret-min-out');
      const fretMaxOut = document.getElementById('fret-max-out');
      const stringToggles = document.getElementById('string-toggles');
      const intervalOut = document.getElementById('interval-out');
      const beatOut = document.getElementById('beat-out');
      const toggleBtn = document.getElementById('toggle');
      const resetBtn = document.getElementById('reset');
      const pickFret = document.getElementById('pick-fret');
      const useFlats = document.getElementById('use-flats');
      // const noRepeat = document.getElementById('no-repeat');
      const clickSound = document.getElementById('click-sound');
      const showNote = document.getElementById('show-note');

      let intervalId = null;
      let running = false;
      let beat = 0;
      let lastKey = '';
      let audioCtx = null;
      const enabledStrings = [true, false, false, false, false, false];

      // Build string toggle buttons
      strings.forEach(function(s, i) {
        const btn = document.createElement('button');
        btn.textContent = s.label;
        btn.title = s.name;
        btn.className = 'string-btn ' + (enabledStrings[i] ? 'on' : 'off');
        btn.addEventListener('click', function() {
          enabledStrings[i] = !enabledStrings[i];
          if (!enabledStrings.some(Boolean)) {
            enabledStrings[i] = true;
            return;
          }
          btn.className = 'string-btn ' + (enabledStrings[i] ? 'on' : 'off');
        });
        stringToggles.appendChild(btn);
      });

      function getInterval() {
        return 60 / parseInt(bpmEl.value, 10);
      }

      function updateBpmReadout() {
        bpmOut.textContent = bpmEl.value;
        intervalOut.textContent = getInterval().toFixed(2) + 's';
      }

      function pickNextRandomNote() {
        const min = parseInt(fretMinEl.value, 10);
        const max = parseInt(fretMaxEl.value, 10);
        const notes = useFlats.checked ? flatNotes : sharpNotes;

        const enabledIdxs = enabledStrings
          .map(function(on, i) { return on ? i : -1; })
          .filter(function(i) { return i >= 0; });

        let stringIdx, fret, key;
        let attempts = 0;
        do {
          stringIdx = enabledIdxs[Math.floor(Math.random() * enabledIdxs.length)];
          fret = min + Math.floor(Math.random() * (max - min + 1));
          key = stringIdx + ':' + fret;
          attempts++;
        } while (key === lastKey && attempts < 20);

        lastKey = key;
        const string = strings[stringIdx];
        const noteIdx = (string.openIdx + fret) % 12;
        return {
          stringName: string.name,
          stringLabel: string.label,
          fret: fret,
          note: notes[noteIdx]
        };
      }

      function playClick() {
        if (!clickSound.checked) return;
        try {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.frequency.value = 1000;
          osc.type = 'square';
          gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.05);
        } catch (e) {}
      }

      function applyFretVisibility() {
        if (pickFret.checked) {
          fretDisplayEl.style.display = '';
          fretLabelEl.style.display = '';
        } else {
          fretDisplayEl.style.display = 'none';
          fretLabelEl.style.display = 'none';
        }
      }

      function tick() {
        beat++;
        beatOut.textContent = beat;
        const p = pickNextRandomNote();

        // if (pickFret.checked) {
        //   stringLineEl.textContent = p.stringName;
        //   noteEl.textContent = showNote.checked ? p.note : '?';
        //   fretDisplayEl.textContent = p.fret;
        //   stringLetterEl.textContent = p.stringLabel;
        // } else {
        //   stringLineEl.textContent = p.stringName + ' • fret ' + p.fret;
        //   noteEl.textContent = showNote.checked ? p.note : '?';
        // }
        stringLineEl.textContent = p.stringName;
        // stringLetterEl.textContent = p.stringLabel;
        noteEl.textContent = showNote.checked ? p.note : '?';
        fretDisplayEl.textContent = p.fret;        
        playClick();
      }

      function start() {
        if (running) return;
        running = true;
        toggleBtn.textContent = 'Stop';
        tick();
        intervalId = setInterval(tick, getInterval() * 1000);
      }

      function stop() {
        running = false;
        toggleBtn.textContent = 'Start';
        if (intervalId) { clearInterval(intervalId); intervalId = null; }
      }

      function reset() {
        stop();
        beat = 0;
        lastKey = '';
        beatOut.textContent = '0';
        stringLineEl.textContent = '—';
        noteEl.textContent = '—';
        fretDisplayEl.textContent = '—';
      }

      bpmEl.addEventListener('input', function() {
        updateBpmReadout();
        if (running) {
          clearInterval(intervalId);
          intervalId = setInterval(tick, getInterval() * 1000);
        }
      });

      fretMinEl.addEventListener('input', function() {
        if (parseInt(fretMinEl.value, 10) > parseInt(fretMaxEl.value, 10)) {
          fretMaxEl.value = fretMinEl.value;
        }
        fretMinOut.textContent = fretMinEl.value;
        fretMaxOut.textContent = fretMaxEl.value;
      });

      fretMaxEl.addEventListener('input', function() {
        if (parseInt(fretMaxEl.value, 10) < parseInt(fretMinEl.value, 10)) {
          fretMinEl.value = fretMaxEl.value;
        }
        fretMinOut.textContent = fretMinEl.value;
        fretMaxOut.textContent = fretMaxEl.value;
      });

      pickFret.addEventListener('change', applyFretVisibility);

      toggleBtn.addEventListener('click', function() {
        if (running) stop(); else start();
      });

      resetBtn.addEventListener('click', reset);

      updateBpmReadout();
      applyFretVisibility();
    })();
  </script>
</body>
</html>
